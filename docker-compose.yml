services:
  api:
    build: .
    ports:
      - "3100:3100"
    env_file: .env
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
