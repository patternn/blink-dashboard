<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0c10" />
  <title>Blink Numbers — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0c0c10;
      --bg-card: #1e1e24;
      --bg-card-alt: #16161b;
      --border-subtle: rgba(255,255,255,0.04);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.4);
      --text-muted: rgba(255,255,255,0.2);
      --accent-amber: #f59e0b;
      --accent-red: #ef4444;
      --accent-green: #34d399;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
      --radius-md: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    .dashboard { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
    .logo-bar { width: 4px; height: 36px; background: linear-gradient(180deg, var(--accent-amber), var(--accent-red)); border-radius: 2px; flex-shrink: 0; }
    .logo-group { display: flex; align-items: center; gap: 12px; }
    .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .title span { color: var(--text-secondary); font-weight: 400; }
    .subtitle { font-size: 13px; color: var(--text-secondary); margin-left: 16px; margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .demo-badge { font-size: 10px; font-weight: 600; color: var(--accent-amber); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); padding: 4px 10px; border-radius: 6px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
    .live-dot-wrap { display: flex; align-items: center; gap: 8px; }
    .live-dot { position: relative; width: 8px; height: 8px; }
    .live-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s ease-in-out infinite; }
    .live-dot-ring { position: absolute; top: 0; left: 0; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); animation: pulseRing 2s ease-in-out infinite; }
    .live-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; font-family: var(--font-mono); }
    .timestamp { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

    /* Period toggle */
    .period-toggle { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 3px; margin-bottom: 24px; width: fit-content; }
    .period-btn { font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; color: var(--text-secondary); background: transparent; transition: all 0.2s; letter-spacing: 0.02em; }
    .period-btn.active { color: var(--text-primary); background: rgba(255,255,255,0.08); }
    .period-btn:hover:not(.active) { color: var(--text-primary); }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 16px; }

    /* Card */
    .card {
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
      border-radius: var(--radius-md);
      padding: 24px 24px 14px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      animation: fadeSlideIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .card-accent { position: absolute; top: 0; left: 24px; right: 24px; height: 2px; border-radius: 0 0 2px 2px; }
    .card-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
    .card-value-row { display: flex; align-items: baseline; gap: 10px; }
    .card-value { font-size: 42px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); letter-spacing: -0.03em; line-height: 1; }
    .spark-wrap { margin: 14px -8px 0; height: 44px; }
    .spark-wrap canvas { width: 100%; height: 100%; }

    /* Comparison row */
    .compare-row { display: flex; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-subtle); }
    .compare-item { flex: 1; }
    .compare-label { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .compare-values { display: flex; align-items: center; gap: 6px; }
    .compare-current { font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: var(--font-mono); }
    .compare-prev { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
    .delta { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); white-space: nowrap; }
    .delta-up { color: var(--accent-green); background: rgba(52,211,153,0.1); }
    .delta-down { color: var(--accent-red); background: rgba(248,113,113,0.1); }
    .delta-neutral { color: var(--text-muted); background: rgba(255,255,255,0.04); }

    /* Globe */
    .globe-card {
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
      border-radius: var(--radius-md);
      padding: 24px;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 190px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .globe-ring { position: absolute; border-radius: 50%; border-style: solid; border-width: 1px; }
    .globe-value { font-size: 48px; font-weight: 700; color: var(--accent-amber); font-family: var(--font-mono); position: relative; z-index: 1; line-height: 1; }
    .globe-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-top: 8px; position: relative; z-index: 1; }
    .globe-compare { position: relative; z-index: 1; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-subtle); width: 100%; display: flex; gap: 12px; }

    /* Footer */
    .footer { margin-top: 24px; padding: 16px 0; border-top: 1px solid var(--border-subtle); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .footer-mono { font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="dashboard" id="app"></div>

  <script>
    // ─── Simulated data with period history ─────────────────
    const rand = (a, b) => Math.random() * (b - a) + a;
    const fmt = (n, d = 0) => n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });

    // Simulated period data: current value, 30d period, prev 30d period, 7d period, prev 7d period
    const data = {
      activeUsers: {
        current: 26213,
        d30: 26213, d30_prev: 23840,
        d7: 5891, d7_prev: 5420,
        color: '#f59e0b', decimals: 0, label: 'Active Users',
      },
      transactions: {
        current: 117196,
        d30: 117196, d30_prev: 98450,
        d7: 28340, d7_prev: 24180,
        color: '#f59e0b', decimals: 0, label: 'Transactions',
      },
      newUsers: {
        current: 5157,
        d30: 5157, d30_prev: 4230,
        d7: 1380, d7_prev: 1120,
        color: '#f59e0b', decimals: 0, label: 'New Users',
      },
      btcCustody: {
        current: 64.98,
        d30: 64.98, d30_prev: 61.24,
        d7: 64.98, d7_prev: 63.45,
        color: '#ef4444', decimals: 2, prefix: '₿ ', label: 'BTC in Custody',
      },
      countriesActive: {
        current: 169,
        d30: 169, d30_prev: 162,
        d7: 143, d7_prev: 138,
        color: '#f59e0b', decimals: 0, label: 'Countries Active',
      },
    };

    // Sparkline history
    const historyLen = 40;
    const sparkHistory = { activeUsers: [], transactions: [], newUsers: [], btcCustody: [] };

    function seedHistory() {
      let m = { activeUsers: data.activeUsers.current, transactions: data.transactions.current, newUsers: data.newUsers.current, btcCustody: data.btcCustody.current };
      for (let i = 0; i < historyLen; i++) {
        m = tickMetrics(m);
        for (const k of Object.keys(sparkHistory)) sparkHistory[k].push(m[k]);
      }
      // Sync current values
      data.activeUsers.current = m.activeUsers;
      data.transactions.current = m.transactions;
      data.newUsers.current = m.newUsers;
      data.btcCustody.current = m.btcCustody;
    }

    function tickMetrics(prev) {
      return {
        activeUsers: prev.activeUsers + Math.round(rand(-5, 15)),
        transactions: prev.transactions + Math.round(rand(10, 60)),
        newUsers: prev.newUsers + Math.round(rand(0, 5)),
        btcCustody: Math.max(0, prev.btcCustody + rand(-0.05, 0.08)),
      };
    }

    function pushSparkHistory() {
      for (const k of Object.keys(sparkHistory)) {
        sparkHistory[k].push(data[k].current);
        if (sparkHistory[k].length > historyLen) sparkHistory[k].shift();
      }
    }

    seedHistory();

    // ─── Delta calc ─────────────────────────────────────────
    function calcDelta(current, prev) {
      if (prev === 0) return { pct: 0, cls: 'delta-neutral' };
      const pct = ((current - prev) / Math.abs(prev)) * 100;
      return { pct, cls: pct > 0 ? 'delta-up' : pct < 0 ? 'delta-down' : 'delta-neutral' };
    }

    function deltaHtml(current, prev) {
      const d = calcDelta(current, prev);
      const arrow = d.pct > 0 ? '▲' : d.pct < 0 ? '▼' : '–';
      return `<span class="delta ${d.cls}">${arrow} ${Math.abs(d.pct).toFixed(1)}%</span>`;
    }

    // ─── Animated counters ──────────────────────────────────
    const counters = {};
    function animateCounter(id, target, decimals = 0, prefix = '') {
      if (!counters[id]) counters[id] = { current: target };
      Object.assign(counters[id], { target, start: counters[id].current, startTime: performance.now(), decimals, prefix });
    }
    (function loop(now) {
      for (const id in counters) {
        const c = counters[id];
        if (!c.el) c.el = document.getElementById(id);
        if (!c.el) continue;
        const p = Math.min((now - (c.startTime || now)) / 1200, 1);
        c.current = c.start + (c.target - c.start) * (1 - Math.pow(1 - p, 3));
        c.el.textContent = (c.prefix || '') + fmt(c.current, c.decimals || 0);
      }
      requestAnimationFrame(loop);
    })(performance.now());

    // ─── Sparklines ─────────────────────────────────────────
    function drawSparkline(id, arr, color) {
      const cv = document.getElementById(id);
      if (!cv) return;
      const ctx = cv.getContext('2d'), dpr = devicePixelRatio || 1, r = cv.getBoundingClientRect();
      cv.width = r.width * dpr; cv.height = r.height * dpr; ctx.scale(dpr, dpr);
      const w = r.width, h = r.height;
      if (arr.length < 2) return;
      const mn = Math.min(...arr), mx = Math.max(...arr), rng = mx - mn || 1, step = w / (arr.length - 1);
      const pts = arr.map((v, i) => [i * step, h - ((v - mn) / rng) * (h - 4) - 2]);
      ctx.clearRect(0, 0, w, h);
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, color + '40'); g.addColorStop(1, color + '00');
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) { const mx2 = (pts[i-1][0]+pts[i][0])/2; ctx.bezierCurveTo(mx2, pts[i-1][1], mx2, pts[i][1], pts[i][0], pts[i][1]); }
      ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath(); ctx.fillStyle = g; ctx.fill();
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) { const mx2 = (pts[i-1][0]+pts[i][0])/2; ctx.bezierCurveTo(mx2, pts[i-1][1], mx2, pts[i][1], pts[i][0], pts[i][1]); }
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
    }

    // ─── Render compare row ─────────────────────────────────
    function compareRowHtml(d, decimals = 0, prefix = '') {
      return `
        <div class="compare-row">
          <div class="compare-item">
            <div class="compare-label">30 days</div>
            <div class="compare-values">
              <span class="compare-current">${prefix}${fmt(d.d30, decimals)}</span>
              ${deltaHtml(d.d30, d.d30_prev)}
            </div>
            <div class="compare-prev">vs ${prefix}${fmt(d.d30_prev, decimals)}</div>
          </div>
          <div class="compare-item">
            <div class="compare-label">7 days</div>
            <div class="compare-values">
              <span class="compare-current">${prefix}${fmt(d.d7, decimals)}</span>
              ${deltaHtml(d.d7, d.d7_prev)}
            </div>
            <div class="compare-prev">vs ${prefix}${fmt(d.d7_prev, decimals)}</div>
          </div>
        </div>
      `;
    }

    // ─── Main render ────────────────────────────────────────
    const metricCards = ['activeUsers', 'transactions', 'newUsers', 'btcCustody'];

    function render() {
      document.getElementById('app').innerHTML = `
        <div class="header">
          <div>
            <div class="logo-group"><div class="logo-bar"></div><h1 class="title">Blink <span>Numbers</span></h1></div>
            <div class="subtitle">Real-time Key Metrics · Rolling Period Comparison</div>
          </div>
          <div class="header-right">
            <div class="demo-badge">Demo Mode</div>
            <div class="live-dot-wrap">
              <div class="live-dot"><div class="live-dot-inner"></div><div class="live-dot-ring"></div></div>
              <span class="live-label">Live</span>
            </div>
            <span class="timestamp">${new Date().toLocaleTimeString()}</span>
          </div>
        </div>

        <div class="grid">
          ${metricCards.map((key, i) => {
            const d = data[key];
            const p = d.prefix || '';
            return `
              <div class="card" style="animation-delay:${i * 0.1}s">
                <div class="card-accent" style="background:linear-gradient(90deg,${d.color},transparent)"></div>
                <div>
                  <div class="card-label">${d.label}</div>
                  <div class="card-value-row">
                    <div class="card-value" id="val-${key}">${p}${fmt(d.current, d.decimals)}</div>
                  </div>
                </div>
                <div class="spark-wrap"><canvas id="spark-${key}"></canvas></div>
                ${compareRowHtml(d, d.decimals, p)}
              </div>
            `;
          }).join('')}
        </div>

        <div class="grid">
          <div class="globe-card" style="animation-delay:0.5s">
            <div class="globe-ring" style="width:70px;height:70px;border-color:rgba(245,158,11,0.12);animation:pulseRing 3s ease-in-out infinite"></div>
            <div class="globe-ring" style="width:110px;height:110px;border-color:rgba(245,158,11,0.09);animation:pulseRing 4s ease-in-out infinite"></div>
            <div class="globe-ring" style="width:150px;height:150px;border-color:rgba(245,158,11,0.06);animation:pulseRing 5s ease-in-out infinite"></div>
            <div class="globe-value" id="val-countries">${fmt(data.countriesActive.current)}</div>
            <div class="globe-label">Countries Active</div>
            <div class="globe-compare">
              <div class="compare-item">
                <div class="compare-label">30 days</div>
                <div class="compare-values">
                  <span class="compare-current">${data.countriesActive.d30}</span>
                  ${deltaHtml(data.countriesActive.d30, data.countriesActive.d30_prev)}
                </div>
                <div class="compare-prev">vs ${data.countriesActive.d30_prev}</div>
              </div>
              <div class="compare-item">
                <div class="compare-label">7 days</div>
                <div class="compare-values">
                  <span class="compare-current">${data.countriesActive.d7}</span>
                  ${deltaHtml(data.countriesActive.d7, data.countriesActive.d7_prev)}
                </div>
                <div class="compare-prev">vs ${data.countriesActive.d7_prev}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <span>Simulated data · rolling 30d vs prev 30d / 7d vs prev 7d</span>
          <span class="footer-mono">Blink Technologies LLC</span>
        </div>
      `;

      requestAnimationFrame(() => {
        metricCards.forEach(k => {
          const d = data[k];
          drawSparkline('spark-'+k, sparkHistory[k], d.color);
          counters['val-'+k] = { current: d.current, el: document.getElementById('val-'+k), target: d.current, start: d.current, startTime: performance.now(), decimals: d.decimals, prefix: d.prefix||'' };
        });
        counters['val-countries'] = { current: data.countriesActive.current, el: document.getElementById('val-countries'), target: data.countriesActive.current, start: data.countriesActive.current, startTime: performance.now(), decimals: 0, prefix: '' };
      });
    }

    render();

    // ─── Live updates ───────────────────────────────────────
    setInterval(() => {
      const prev = { activeUsers: data.activeUsers.current, transactions: data.transactions.current, newUsers: data.newUsers.current, btcCustody: data.btcCustody.current };
      const next = tickMetrics(prev);

      // Update current values
      data.activeUsers.current = next.activeUsers;
      data.transactions.current = next.transactions;
      data.newUsers.current = next.newUsers;
      data.btcCustody.current = next.btcCustody;

      // Slowly drift the 30d/7d values for realism
      for (const k of metricCards) {
        data[k].d30 = data[k].current;
        data[k].d7 += (data[k].current - data[k].d7) * 0.01;
      }

      pushSparkHistory();

      metricCards.forEach(k => {
        const d = data[k];
        animateCounter('val-'+k, d.current, d.decimals, d.prefix||'');
        drawSparkline('spark-'+k, sparkHistory[k], d.color);
      });
      animateCounter('val-countries', data.countriesActive.current);

      const ts = document.querySelector('.timestamp');
      if (ts) ts.textContent = new Date().toLocaleTimeString();
    }, 3000);

    window.addEventListener('resize', () => metricCards.forEach(k => drawSparkline('spark-'+k, sparkHistory[k], data[k].color)));
  </script>
</body>
</html>
