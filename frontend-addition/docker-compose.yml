# Updated docker-compose.yml — replaces the existing one at repo root
# Runs frontend (Vite/Nginx), backend (Express), and Redis together

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3100:3100"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
